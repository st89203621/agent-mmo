# Spring Boot 配置 - 集成ioGame WebSocket服务
server.port=8090

# MongoDB 配置
spring.data.mongodb.uri=mongodb://localhost:27017/mmo_game

# Session 持久化到 MongoDB（服务器重启不丢失登录状态）
spring.session.store-type=mongodb

# 日志配置
logging.level.com.iohao.mmo=INFO
logging.level.org.springframework.data.mongodb=WARN

# ============== AI Provider 配置 ==============
# 可选: local | volcengine
ai.chat.provider=local
ai.image.provider=local

# 本地 Chat（OpenAI 兼容：vLLM / Ollama / llama.cpp-server 等）
# 31 上 vLLM 直连，免鉴权；gpustack 聚合入口是 http://172.16.80.46:8500/v1（需 api-key）
ai.chat.local.base-url=http://192.168.22.31:8901/v1
ai.chat.local.model=/home/models/Qwen3.5-35B-A3B-GPTQ-Int4
ai.chat.local.api-key=
ai.chat.local.timeout-sec=120
# Qwen3.5 默认开启 reasoning，会把 token 全耗在思考链；业务不需要 CoT 输出时关闭
ai.chat.local.disable-thinking=true

# 火山 Chat（仅 ai.chat.provider=volcengine 时生效）
ai.chat.volcengine.api-key=
ai.chat.volcengine.model=ep-20260306100428-q9wzl

# 本地图像（ComfyUI，对应桌面 FLUX.2-klein 部署）
ai.image.local.base-url=http://192.168.22.31:8199
ai.image.local.pipeline=flux2
ai.image.local.diffusion-model=flux-2-klein-9b-fp8.safetensors
ai.image.local.text-encoder=qwen_3_8b_fp8mixed.safetensors
ai.image.local.vae=flux2-vae.safetensors
ai.image.local.sampler-name=euler
ai.image.local.scheduler=simple
ai.image.local.steps=4
ai.image.local.cfg=1.0
ai.image.local.weight-dtype=fp8_e4m3fn
ai.image.local.poll-interval-ms=100
ai.image.local.timeout-sec=300

# 火山图像（仅 ai.image.provider=volcengine 时生效）
ai.image.volcengine.api-key=
ai.image.volcengine.model=doubao-seedream-4-0-250828
ai.image.volcengine.size=1024x1024

# ============== 宠物图片落盘配置 ==============
pet.asset.frontend-server-url=auto
pet.asset.frontend-assets-path=C:/deye-6.4/agent-mmo/game-client/dist/assets/pets/ai-generated
pet.asset.background-removal-tolerance=20

# 前端资源 URL（CompanionService.avatarUrl 重写用）
app.frontend-server-url=auto

# ============== 小说爬取 ==============
crawl.search-url=https://www.xbiquge.so/search.php?keyword={keyword}
crawl.max-chapters=10
crawl.request-delay-ms=300
