# Spring Boot 配置 - 集成ioGame WebSocket服务
server.port=8090

# 前端游戏文件目录（开发时用 Vite dev server，生产用构建产物）
game.frontend-path=C:/deye-6.4/agent-mmo/game-client/dist

# 静态资源：优先从前端构建目录加载
spring.web.resources.static-locations=file:///C:/deye-6.4/agent-mmo/game-client/dist/,classpath:/static/

# MongoDB 配置
spring.data.mongodb.uri=mongodb://localhost:27017/mmo_game

# Session 持久化到 MongoDB（服务器重启不丢失登录状态）
spring.session.store-type=mongodb

# 日志配置
logging.level.com.iohao.mmo=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# Volcengine AI 配置
# 前端服务器URL配置 - 用于生成图片访问URL
# 支持三种配置方式:
#   1. auto - 自动检测本机IP,使用默认端口8080 (推荐)
#   2. 端口号 - 例如: 8080 (自动检测本机IP,使用指定端口)
#   3. 完整URL - 例如: http://192.168.0.105:8080 (手动指定)
volcengine.frontend-server-url=auto
volcengine.frontend-assets-path=./my-phaser-game/assets/pets/ai-generated

# 背景去除配置 - 用于AI生成图片后处理
# 容差值(tolerance): 控制背景去除的激进程度(建议: 30-80, 默认: 60)
# 越大 = 去除更多背景,可能误删前景
# 越小 = 保留更多内容,可能残留背景
volcengine.background-removal-tolerance=50

# 亮度阈值(brightness): RGB三通道平均值阈值(建议: 220-250, 默认: 240)
# 越高 = 只去除很亮的背景
# 越低 = 去除更多浅色背景
volcengine.background-removal-brightness=220

# AI对话模型（豆包 Pro 32K，支持长上下文）
volcengine.chat-model=ep-20260306100428-q9wzl
# AI对话API Key
volcengine.chat-api-key=3e2f9349-8892-4a67-ae9c-7e8fbd75f071
# AI图片生成API Key（可使用不同账号，未配置时回退到chat-api-key）
volcengine.image-api-key=fe3c07ab-6fb2-4c7a-b19e-13417a97da10

# 小说爬取配置
crawl.search-url=https://www.xbiquge.so/search.php?keyword={keyword}
crawl.max-chapters=10
crawl.request-delay-ms=300
