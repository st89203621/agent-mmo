<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>七世轮回</title>
    <style>
        :root {
            --ink: #0e0b09;
            --gold: #c9a84c;
            --paper: #f5ede0;
            --red: #8b2a2a;
            --dark-gold: #a07830;
            --light-gold: #e8c96a;
            --dim: rgba(14,11,9,0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0e0b09;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: "Microsoft YaHei", "微软雅黑", PingFang SC, sans-serif;
        }

        #game-container {
            position: relative;
            width: 390px;
            height: 680px;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        /* HTML Overlay UI */
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 390px;
            height: 680px;
            pointer-events: none;
            z-index: 10;
        }

        /* Login Form */
        #login-form {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 280px;
            pointer-events: all;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 4px;
            color: #f5ede0;
            font-size: 15px;
            font-family: "Microsoft YaHei", sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input::placeholder {
            color: rgba(245,237,224,0.4);
        }

        .input-group input:focus {
            border-color: #c9a84c;
        }

        #btn-login {
            width: 100%;
            padding: 11px;
            background: linear-gradient(135deg, #c9a84c, #a07830);
            border: none;
            border-radius: 4px;
            color: #0e0b09;
            font-size: 16px;
            font-weight: bold;
            font-family: "Microsoft YaHei", sans-serif;
            cursor: pointer;
            letter-spacing: 3px;
            transition: opacity 0.2s;
        }

        #btn-login:hover { opacity: 0.88; }
        #btn-login:active { opacity: 0.75; }

        #login-error {
            color: #e05555;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
            min-height: 18px;
        }

        /* Story free input */
        #story-input-area {
            display: none;
            position: absolute;
            bottom: 70px;
            left: 0;
            width: 100%;
            padding: 8px 12px;
            pointer-events: all;
        }

        #story-input-row {
            display: flex;
            gap: 8px;
        }

        #story-free-input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 20px;
            color: #f5ede0;
            font-size: 14px;
            font-family: "Microsoft YaHei", sans-serif;
            outline: none;
        }

        #story-free-input:focus { border-color: #c9a84c; }

        #btn-story-send {
            padding: 8px 16px;
            background: linear-gradient(135deg, #c9a84c, #a07830);
            border: none;
            border-radius: 20px;
            color: #0e0b09;
            font-size: 14px;
            font-weight: bold;
            font-family: "Microsoft YaHei", sans-serif;
            cursor: pointer;
        }

        /* Book search */
        #book-search-area {
            display: none;
            position: absolute;
            top: 12px;
            left: 12px;
            width: calc(100% - 24px);
            pointer-events: all;
        }

        #book-search-input {
            width: 100%;
            padding: 9px 14px;
            background: rgba(201,168,76,0.08);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 20px;
            color: #f5ede0;
            font-size: 14px;
            font-family: "Microsoft YaHei", sans-serif;
            outline: none;
        }

        #book-search-input:focus { border-color: #c9a84c; }

        /* Bag item tooltip */
        #item-tooltip {
            display: none;
            position: absolute;
            background: rgba(14,11,9,0.95);
            border: 1px solid rgba(201,168,76,0.6);
            border-radius: 6px;
            padding: 12px;
            width: 200px;
            pointer-events: all;
            z-index: 20;
        }

        #item-tooltip h4 {
            color: #c9a84c;
            font-size: 14px;
            margin-bottom: 6px;
        }

        #item-tooltip p {
            color: #f5ede0;
            font-size: 12px;
            line-height: 1.5;
            opacity: 0.8;
        }

        #item-tooltip .btn-close-tooltip {
            margin-top: 8px;
            padding: 4px 10px;
            background: rgba(201,168,76,0.2);
            border: 1px solid rgba(201,168,76,0.4);
            border-radius: 3px;
            color: #c9a84c;
            font-size: 12px;
            cursor: pointer;
        }

        /* Loading */
        #loading-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0e0b09;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #loading-screen h1 {
            color: #c9a84c;
            font-size: 32px;
            letter-spacing: 6px;
            font-family: "Microsoft YaHei", sans-serif;
        }

        #loading-dots {
            color: rgba(201,168,76,0.6);
            font-size: 14px;
            margin-top: 16px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
<div id="game-container">
    <div id="loading-screen">
        <h1>七世轮回</h1>
        <div id="loading-dots">载入中...</div>
    </div>
    <div id="ui-overlay">
        <!-- Login Form -->
        <div id="login-form">
            <div class="input-group">
                <input type="text" id="input-username" placeholder="用户名" autocomplete="username" />
            </div>
            <div class="input-group">
                <input type="password" id="input-password" placeholder="密码" autocomplete="current-password" />
            </div>
            <button id="btn-login">踏 入 轮 回</button>
            <div id="login-error"></div>
        </div>

        <!-- Story free input -->
        <div id="story-input-area">
            <div id="story-input-row">
                <input type="text" id="story-free-input" placeholder="与 NPC 自由对话..." maxlength="100" />
                <button id="btn-story-send">发送</button>
            </div>
        </div>

        <!-- Book search -->
        <div id="book-search-area">
            <input type="text" id="book-search-input" placeholder="搜索书籍..." />
        </div>

        <!-- Item tooltip -->
        <div id="item-tooltip">
            <h4 id="tooltip-name">物品名称</h4>
            <p id="tooltip-desc">物品描述文字</p>
            <button class="btn-close-tooltip" onclick="document.getElementById('item-tooltip').style.display='none'">关闭</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
